# Domain-specific scenarios
- objective: "Draft a legal disclaimer for a software application"
  context: |
    Software Application: Mobile fitness tracking app
    Features: Exercise logging, calorie counting, social sharing
    Risk areas: Data privacy, medical advice disclaimer
    Jurisdiction: United States
  expectedBehavior: "grounded-answer"
  description: "Legal domain task with specific context"

- objective: "Create a marketing strategy for this product launch"
  context: |
    Product: Eco-friendly reusable water bottle
    Target market: Environmentally conscious millennials
    Price point: $25-30
- expectedBehavior: "grounded-answer"
  description: "Marketing domain task with business context"

- objective: "Summarize this medical research for patient education"
  context: |
    Clinical Study: Effects of regular exercise on cardiovascular health
    Participants: 500 adults aged 40-65
    Duration: 12 months
    Findings: 30% reduction in cardiovascular events among regular exercisers
    Limitations: Self-reported exercise data, homogeneous sample population
  expectedBehavior: "grounded-answer"
  description: "Medical domain with research context"

- objective: "Explain the financial implications of this economic policy"
  context: |
    Policy: Federal Reserve interest rate increase of 0.25%
    Rationale: Combat inflationary pressures
    Expected effects: Higher borrowing costs, reduced consumer spending
    Sectors affected: Housing, automotive, business investment
  expectedBehavior: "grounded-answer"
  description: "Financial domain with policy context"

# Multi-hop reasoning tests
- objective: "If Company A acquired Company B, and Company B's main product was X, what should Company A focus on next?"
  context: |
    Company A: Major tech corporation focused on cloud services
    Company B: Startup specializing in AI-powered customer service
    Product X: Automated customer support chatbots
    Market trend: Growing demand for integrated AI solutions
  expectedBehavior: "grounded-answer"
  description: "Multi-step reasoning with business context"

- objective: "What are the potential consequences of this technological advancement?"
  context: |
    Technology: Quantum computing achieving quantum supremacy
    Current status: 100-qubit processor operational
    Potential applications: Cryptography, drug discovery, optimization
    Major players: Google, IBM, Microsoft, startups
  expectedBehavior: "grounded-answer"
  description: "Complex reasoning with technological context"

# Ambiguity and clarification tests
- objective: "It depends on the context. Can you explain what you mean?"
  context: "The term 'cloud' can refer to weather, computing, or abstract concepts."
  expectedBehavior: "grounded-answer"
  description: "Ambiguous query requiring contextual interpretation"

- objective: "That's interesting, but can you be more specific?"
  context: "Machine learning is a subset of artificial intelligence."
  expectedBehavior: "grounded-answer"
  description: "Follow-up question requiring elaboration"
