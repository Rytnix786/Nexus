services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB before starting the stack}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER before starting the stack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD before starting the stack}
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    volumes:
      - nexus_ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:1b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-true}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS:-5}
      TAVILY_API_KEY: ${TAVILY_API_KEY:?set TAVILY_API_KEY before starting the stack}
      TAVILY_BASE_URL: ${TAVILY_BASE_URL:-https://api.tavily.com}
      TAVILY_TIMEOUT_SECONDS: ${TAVILY_TIMEOUT_SECONDS:-20}
      APP_ENV: production
      MAX_ITERATIONS: ${MAX_ITERATIONS:-6}
      MAX_RUN_SECONDS: ${MAX_RUN_SECONDS:-900}
      DEFAULT_TOKEN_BUDGET: 12000
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-true}
      API_KEY: ${API_KEY:?set API_KEY before starting the stack}
      RUN_REQUESTS_PER_MINUTE: ${RUN_REQUESTS_PER_MINUTE:-30}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TOKEN_LEDGER_V2: ${TOKEN_LEDGER_V2:-true}
      AUTH_RBAC_V2: ${AUTH_RBAC_V2:-true}
      SSE_RESUME_V2: ${SSE_RESUME_V2:-true}
      API_CONTRACT_V2: ${API_CONTRACT_V2:-true}
      QUOTA_DAILY_TOKENS: ${QUOTA_DAILY_TOKENS:-200000}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET before starting the stack}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      IDEMPOTENCY_TTL_MINUTES: ${IDEMPOTENCY_TTL_MINUTES:-120}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "${NEXUS_BACKEND_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:1b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-true}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS:-5}
      TAVILY_API_KEY: ${TAVILY_API_KEY:?set TAVILY_API_KEY before starting the stack}
      TAVILY_BASE_URL: ${TAVILY_BASE_URL:-https://api.tavily.com}
      TAVILY_TIMEOUT_SECONDS: ${TAVILY_TIMEOUT_SECONDS:-20}
      APP_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_KEY: ${API_KEY:?set API_KEY before starting the stack}
    command: >
      sh -c "rq worker nexus_runs --url $${REDIS_URL:-redis://redis:6379/0}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${NEXUS_BACKEND_PORT:-8000}/api}
    ports:
      - "${NEXUS_FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  nexus_postgres_data:
  nexus_ollama_data:
